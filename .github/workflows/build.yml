name: Build Vlanya Chat Desktop

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Build Windows release files
        run: npm run pack

      - name: Upload Windows release files
        uses: actions/upload-artifact@v4
        with:
          name: Vlanya-Chat-windows
          path: |
            dist/Vlanya-Chat-Windows-Setup-*.exe
            dist/Vlanya-Chat-Windows-Setup-*.exe.blockmap
            dist/Vlanya-Chat-Windows-*-portable.exe
            dist/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Vlanya Chat ${{ github.ref_name }}
          files: |
            dist/Vlanya-Chat-Windows-Setup-*.exe
            dist/Vlanya-Chat-Windows-Setup-*.exe.blockmap
            dist/Vlanya-Chat-Windows-*-portable.exe
            dist/latest.yml
          generate_release_notes: true
