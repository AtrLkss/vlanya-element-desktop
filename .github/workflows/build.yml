name: Build Vlanya Element Desktop

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows portable
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Build portable EXE
        run: npm run pack

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: Vlanya-Element-portable
          path: dist/Vlanya-Element-*-portable.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Vlanya Element ${{ github.ref_name }}
          files: dist/Vlanya-Element-*-portable.exe
          generate_release_notes: true
